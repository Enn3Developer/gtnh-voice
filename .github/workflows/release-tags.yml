
name: Release tagged build

on:
  push:
    tags: [ 'v[0-9]*.[0-9]*.[0-9]*' ]

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-test:
    uses: ./.github/workflows/build-and-test.yml
    secrets: inherit

  release:
    needs: build-and-test
    runs-on: ubuntu-24.04
    env:
      RELEASE_VERSION: ${{ github.ref_name }}
    steps:
      - name: Checkout mod repo
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Verify tag is on master
        run: |
          git fetch origin master --quiet
          if ! git merge-base --is-ancestor "${GITHUB_SHA}" origin/master; then
            echo "::error::Tag ${RELEASE_VERSION} (${GITHUB_SHA}) is not reachable from master."
            exit 1
          fi

      - name: Strip 'v' prefix from tag
        id: version
        run: echo "number=${RELEASE_VERSION#v}" >> "$GITHUB_OUTPUT"

      - name: Get changelog entry for ${{ github.ref_name }}
        id: changelog_reader
        uses: mindsers/changelog-reader-action@v2
        with:
          version: ${{ steps.version.outputs.number }}
          path: ./CHANGELOG.md

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'zulu'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5
        with:
          build-scan-publish: true
          build-scan-terms-of-use-url: "https://gradle.com/terms-of-service"
          build-scan-terms-of-use-agree: "yes"
          validate-wrappers: true

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Setup the workspace
        run: ./gradlew --build-cache --info --stacktrace setupCIWorkspace

      - name: Build the mod
        run: ./gradlew --build-cache --info --stacktrace assemble

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${RELEASE_VERSION}" \
            --title "${RELEASE_VERSION}" \
            --notes-file "${{ steps.changelog_reader.outputs.changes_file }}" \
            ./build/libs/*.jar
